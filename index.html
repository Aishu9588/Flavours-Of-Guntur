<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavours of Guntur Billing Software</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f5f5f5;
        margin:0;
        padding:20px;
    }

    .container{
        max-width:900px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        color:#b22222;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    table, th, td{
        border:1px solid #ddd;
    }

    th, td{
        padding:10px;
        text-align:center;
    }

    input[type="number"]{
        width:60px;
        padding:5px;
    }

    button{
        background:#b22222;
        color:white;
        border:none;
        padding:10px 20px;
        margin:10px 5px;
        cursor:pointer;
        border-radius:5px;
    }

    button:hover{
        background:#8b0000;
    }

    .total-box{
        text-align:right;
        font-size:22px;
        font-weight:bold;
        margin-top:20px;
    }

    .bill-info{
        display:flex;
        justify-content:space-between;
        margin-bottom:15px;
    }

    @media print{
        button{
            display:none;
        }

        body{
            background:white;
        }

        .container{
            box-shadow:none;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>FLAVOURS OF GUNTUR</h1>

    <div class="bill-info">
        <div>
            <strong>Bill No:</strong>
            <span id="billNo"></span>
        </div>

        <div>
            <strong>Date:</strong>
            <span id="date"></span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Price (₹)</th>
                <th>Qty</th>
                <th>Total (₹)</th>
            </tr>
        </thead>

        <tbody id="menuTable">
        </tbody>
    </table>

    <div class="total-box">
        Grand Total: ₹ <span id="grandTotal">0</span>
    </div>

    <br>

    <button onclick="calculateTotal()">Calculate Total</button>
    <button onclick="window.print()">Print Receipt</button>

</div>

<script>

const menu = [
    {name:"Chicken Dum Biryani", price:220},
    {name:"Chicken Cooker Biryani", price:249},
    {name:"Mutton Dum Biryani", price:320},
    {name:"Mutton Cooker Biryani", price:349},
    {name:"Natukodi Pulav", price:280},
    {name:"Chicken Fry Piece Biryani", price:260},
    {name:"Chicken Lollipop", price:180},
    {name:"Apollo Fish", price:220},
    {name:"Paneer Biryani", price:230},
    {name:"Veg Biryani", price:180},
    {name:"Water Bottle", price:20},
    {name:"Cool Drink", price:40}
];

const table = document.getElementById("menuTable");

menu.forEach((item,index)=>{

    table.innerHTML += `
    <tr>
        <td>${item.name}</td>
        <td>${item.price}</td>
        <td>
            <input type="number"
                   min="0"
                   value="0"
                   id="qty${index}">
        </td>
        <td id="total${index}">0</td>
    </tr>
    `;
});

function calculateTotal(){

    let grandTotal = 0;

    menu.forEach((item,index)=>{

        let qty = parseInt(document.getElementById(`qty${index}`).value) || 0;

        let total = qty * item.price;

        document.getElementById(`total${index}`).innerText = total;

        grandTotal += total;
    });

    document.getElementById("grandTotal").innerText = grandTotal;
}

document.getElementById("billNo").innerText =
Math.floor(Math.random()*100000);

document.getElementById("date").innerText =
new Date().toLocaleString();

</script>

</body>
</html>
